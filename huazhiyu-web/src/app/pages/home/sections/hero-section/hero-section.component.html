<section class="hero" aria-labelledby="hero-title">
  <div class="site-container hero__grid">
    <div class="hero__copy" hzyReveal="stagger-item">
      <h1 id="hero-title" class="hero__title">
        {{ content.titleLine1 }}<br />
        <span class="hero__title-accent">{{ content.titleAccent }}</span>
      </h1>
      <p class="hero__lead">{{ content.lead }}</p>
      <div class="hero__actions">
        <a class="btn-primary" href="#inquiry">{{ content.primaryCta }}</a>
        <a class="text-link" href="#services">
          {{ content.secondaryLink }}
          <span class="text-link__arrow" aria-hidden="true">→</span>
        </a>
      </div>

      <ul class="hero__points">
        @for (point of content.points; track point.label) {
          <li class="hero__point">
            <span class="hero__point-label">
              <span class="hero__point-dot" aria-hidden="true"></span>
              {{ point.label }}
            </span>
            <span class="hero__point-desc">{{ point.desc }}</span>
          </li>
        }
      </ul>
    </div>

    <!-- Approved abstract Hero artwork; the image itself carries no essential copy. -->
    <div class="hero__visual">
      <div class="hero__visual-artwork">
        <picture class="hero__visual-picture">
          <source
            srcset="/images/hero-ip-structure-visual.webp"
            type="image/webp"
          />
          <img
            class="hero__visual-image"
            src="/images/hero-ip-structure-visual.png"
            width="1619"
            height="971"
            alt="抽象的技术信息与知识产权保护结构示意图"
            loading="eager"
            fetchpriority="high"
            decoding="async"
          />
        </picture>
      </div>
    </div>
  </div>
</section>

<header class="site-header" [class.site-header--scrolled]="scrolled()">
  <div class="site-container site-header__inner">
    <a class="site-header__logo" href="/">
      <img
        class="site-header__logo-img"
        src="logo.png"
        [alt]="content.logoAlt"
        width="394"
        height="80"
      />
    </a>

    <nav class="site-header__nav" aria-label="主导航">
      @for (item of content.nav.items; track item.label) {
        @if (item.pending) {
          <span class="site-header__nav-link site-header__nav-link--pending" title="页面待上线">
            {{ item.label }}
          </span>
        } @else {
          <a class="site-header__nav-link" [href]="item.href">{{ item.label }}</a>
        }
      }
    </nav>

    <a class="btn-primary site-header__cta" href="#inquiry">
      {{ content.nav.cta }}
      <span aria-hidden="true">→</span>
    </a>
  </div>
</header>
